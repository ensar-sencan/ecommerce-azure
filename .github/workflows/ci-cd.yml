name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}          # yourregistry.azurecr.io
  BACKEND_IMAGE: ecommerce-backend
  FRONTEND_IMAGE: ecommerce-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend Tests
  # ─────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ─────────────────────────────────────────
  # JOB 2: Build & Push to Azure Container Registry
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          BRANCH="${GITHUB_REF_NAME}"
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}"
          docker build -f docker/Dockerfile.backend -t $IMAGE .
          docker tag $IMAGE "${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"
          docker push $IMAGE
          docker push "${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest"

      - name: Build & push frontend image
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}"
          docker build -f docker/Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t $IMAGE .
          docker tag $IMAGE "${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"
          docker push $IMAGE
          docker push "${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest"

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Staging
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Staging App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.STAGING_BACKEND_APP }}
          images: '${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest'

      - name: Deploy frontend to Staging Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STAGING_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next

  # ─────────────────────────────────────────
  # JOB 4: Deploy to Production
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Production App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.PROD_BACKEND_APP }}
          images: '${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest'

      - name: Deploy frontend to Production Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.PROD_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next

      - name: Notify deployment success
        if: success()
        run: echo "✅ Production deployment completed — $(date -u)"
